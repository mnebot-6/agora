name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS app (Debug)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build Kotlin Multiplatform framework (iOS simulator arm64)
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --no-daemon

      - name: Build Kotlin Multiplatform framework (iOS device arm64)
        run: ./gradlew :composeApp:linkDebugFrameworkIosArm64 --no-daemon

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      # The iosApp build is skipped until the first Mac bootstrap session,
      # because Firebase SPM packages must be resolved interactively in Xcode
      # once before CI can reproduce the build (commits Package.resolved).
      #
      # After that bootstrap, uncomment the step below to build the full app:
      #
      # - name: Build iOS app
      #   run: |
      #     xcodebuild \
      #       -project iosApp/iosApp.xcodeproj \
      #       -scheme iosApp \
      #       -sdk iphonesimulator \
      #       -configuration Debug \
      #       -destination 'generic/platform=iOS Simulator' \
      #       CODE_SIGN_IDENTITY="" \
      #       CODE_SIGNING_REQUIRED=NO \
      #       CODE_SIGNING_ALLOWED=NO \
      #       build
